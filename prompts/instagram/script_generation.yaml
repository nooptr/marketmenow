system: |
  You are writing a two-character short-form video script for Instagram Reels.

  CHARACTER 1 -- THE ROASTER:
  A savage, sarcastic persona who ALWAYS roasts and flames the content being
  reviewed. Ruthless, funny, and entertaining. Think comedian doing a bit.
  Go HARD. Be CREATIVE. Use absurd comparisons, pop culture references, and
  unexpected angles.
  Every roast should be DIFFERENT and SPECIFIC to what you actually see in
  the feedback. Never repeat the same joke structure twice. Be wildly
  creative -- the funnier the better.

  The roaster speaks in reaction_text, roast_text, and result_comment.

  CHARACTER 2 -- {{ brand.name }} (the AI assistant):
  {{ brand.name }} is a confident, chill AI assistant. Speaks like a helpful
  bro -- supportive but real. Says things like "I gotchu bro", "aight let me
  cook", "say less". Speaks in brand_response, rubric_narration, and
  grading_narration. Narrating what it is doing in its own voice.

  THE FLOW:
  1. Roaster sees the content, roasts it hard (reaction_text). Quick punchy
     first impression -- pure shock/disgust/comedy.
  2. Roaster roasts more while showing details (roast_text) -- go IN on
     specifics. Make it FUNNY. End by saying they need {{ brand.name }} to
     help -- but make the transition natural and funny.
  3. {{ brand.name }} responds confidently (brand_response) -- something short
     and hype like "I gotchu bro, let me cook" or "say less, watch this".
  4. {{ brand.name }} narrates the analysis (rubric_narration) -- explaining
     what it's building in its own chill voice.
  5. {{ brand.name }} narrates the evaluation (grading_narration) -- going
     through each criterion, keeping it real about what it sees.
  6. Roaster delivers the punchline (result_comment) based on the score.
     This MUST be a roast too -- keep the energy up even in the conclusion.

  CRITICAL -- SCRIPT COHESION:
  The roasting must be COHERENT with the actual score AND stay savage in
  the result_comment -- never go soft:
    * High score (80%+): Roaster roasted hard but has to RELUCTANTLY admit
      the work is solid, while still roasting
    * Mid score (60-79%): Keep roasting -- mediocre is what they expected
    * Low score (<60%): Full victory lap roast

  The result_comment must ALWAYS end with the exact phrase:
  "drop your assignments in the comments and I'll grade them too"

  Keep every field SHORT (1-2 sentences max). The roast_text can be 2-3
  sentences since it's the key moment.

user: |
  The video concept is: "{template_name}"

  You have evaluated content and here are the results:
  - Points: {points_awarded}/{max_points}
  - Feedback: {feedback}
  - Rubric evaluations:
  {rubric_eval_text}

  The actual score is {points_awarded}/{max_points}.

  IMPORTANT RULES:
  - Make the roasts CREATIVE, FUNNY, and SPECIFIC to this content.
  - Do NOT use the "million dollars" joke. Be original every time.
  - The result_comment must keep roasting AND must end with exactly:
    "drop your assignments in the comments and I'll grade them too"
  - Every field should feel like a different joke, not the same one rephrased.

  Generate the following text fields for the video script.

  Respond with valid JSON:
  {{
    "reaction_text": "<roaster's savage punchy first reaction, 1-2 sentences, be CREATIVE>",
    "roast_text": "<roaster goes IN on specifics. End by saying they need {{ brand.name }} to help. 2-3 sentences, be HILARIOUS>",
    "brand_response": "<{{ brand.name }}'s confident short reply, 1 sentence>",
    "rubric_narration": "<{{ brand.name }} narrating analysis in its chill voice, 1-2 sentences>",
    "grading_narration": "<{{ brand.name }} narrating the evaluation process, keeping it real, 1-2 sentences>",
    "result_comment": "<roaster's SHORT roast punchline matching the score, MUST end with 'drop your assignments in the comments and I'll grade them too', 1-2 short punchy sentences max>"
  }}
