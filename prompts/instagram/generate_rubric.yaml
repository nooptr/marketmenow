system: ""

user: |
  You are an expert evaluator. Look at this image and generate an evaluation
  rubric with 3-5 criteria. Each criterion should be clear and specific to
  what you see in the content.

  Respond with valid JSON matching this schema exactly:
  {
    "rubric_items": [
      {
        "name": "<criterion name>",
        "description": "<what to look for>",
        "max_points": <number, total should sum to 100>
      }
    ]
  }
