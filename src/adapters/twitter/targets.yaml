# Twitter engagement targets -- format reference.
# Override these by placing a targets/twitter.yaml in your project directory
# (e.g. projects/<slug>/targets/twitter.yaml).

handles:
  # Accounts whose tweets you want to engage with.
  # Use the @handle format.
  - "@example_influencer_1"
  - "@example_influencer_2"
  - "@example_industry_leader"

hashtags:
  # Hashtags to monitor for engagement opportunities.
  - "#yourindustry"
  - "#yourproduct"
  - "#relevanthashtag"
