items:
  - platform: instagram
    command_type: reel
    params:
      template: can_ai_grade_this

  - platform: instagram
    command_type: reel
    params:
      template: reddit_horror_story

  - platform: instagram
    command_type: carousel
    count: 2

  - platform: twitter
    command_type: thread

  - platform: twitter
    command_type: engage

  - platform: twitter
    command_type: outreach
    params:
      profile: campaigns/twitter-outreach.yaml

  - platform: linkedin
    command_type: post

  - platform: facebook
    command_type: post

  - platform: reddit
    command_type: engage

  # One Short per reel template (paired by index with the two reels above).
  - platform: youtube
    command_type: short
    count: 1
    params:
      title: "Can AI grade this assignment in seconds?"
      description: |
        Watch AI run a real rubric on a real paper — then try the same on your stack.

        Gradeasy: grading against YOUR rubric in seconds. You stay in control.

        https://gradeasy.ai

        #shorts #grading #teachers #edtech #teacherlife #AI #ChatGPT #Gradeasy
  - platform: youtube
    command_type: short
    count: 1
    params:
      title: "Grading horror: her paper pile went wrong"
      description: |
        A spooky grading story — because every teacher knows the pile can feel cursed.

        When you're done doom-scrolling: Gradeasy grades to your rubric in seconds.

        https://gradeasy.ai

        #shorts #horror #storytime #teachers #grading #edtech #Gradeasy

  - platform: tiktok
    command_type: upload
    count: 2
    params:
      title: "Can AI grade your homework? Try it free at gradeasy.ai"
      hashtags: "AIGrading,EdTech,Gradeasy,TeacherHack,fyp,SchoolHacks,AI,gradeasy"

  - platform: email
    command_type: send
    params:
      template: templates/email/sharegradeasy.html
      file: vault/teachers.csv
